services:
  - type: web
    name: richsystem-backend
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 60
    envVars:
      - key: MOLIT_API_KEY
        sync: false
      - key: KAKAO_REST_KEY
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.7
